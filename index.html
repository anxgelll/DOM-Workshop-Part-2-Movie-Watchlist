<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Watchlist</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main id="app">
    <header>
      <h1 id="app-title">🎬 Movie Watchlist</h1>
      <p id="movie-count">0 movies</p>
    </header>

    <form id="movie-form">
      <input type="text" id="title-input" placeholder="Movie title" required />
      <input type="text" id="genre-input" placeholder="Genre (optional)" />
      <button type="submit" id="add-btn">Add Movie</button>
    </form>

    <div id="filter-bar">
      <button id="filter-all" class="filter-btn active-filter">All</button>
      <button id="filter-unwatched" class="filter-btn">Unwatched</button>
      <button id="filter-watched" class="filter-btn">Watched</button>
      <button id="clear-watched-btn">Clear Watched</button>
    </div>

    <ul id="movie-list"></ul>
  </main>
</body>
</html>
